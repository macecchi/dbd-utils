name = "dbd-tracker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[observability]
[observability.logs]
enabled = true
invocation_logs = false

[vars]
FRONTEND_URL = "http://localhost:5173"

[[d1_databases]]
binding = "DB"
database_name = "dbd-tracker-db"
database_id = "local"
migrations_dir = "migrations"

[env.production]
vars = { FRONTEND_URL = "https://macecchi.github.io/dbd-utils" }

[env.production.d1_databases]
binding = "DB"
database_name = "dbd-tracker-db"
database_id = "TODO_SET_AFTER_D1_CREATE"
migrations_dir = "migrations"
