<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <script>
    if (location.hostname === 'macecchi.github.io')
      location.replace('https://filadbd.pages.dev' + location.pathname.replace('/dbd-utils', '') + (location.hash ? location.hash.slice(1) : ''));
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Fila DBD - Fila de pedidos</title>
  <!-- Self-hosted body font: preload so it's fetched in parallel with the bundle,
       no render-blocking Google Fonts CSS hop. JetBrains Mono is non-critical
       (small mono UI text) and loads lazily via @font-face. -->
  <link rel="preload" href="/fonts/dm-sans.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <!-- Critical app-shell CSS, inlined so the dark frame paints before the bundle
       and external stylesheet parse (kills the white flash on first/hard-refresh).
       Values mirror the --bg / --text tokens and body styles in base.css, so there
       is no reflow when the full stylesheet loads. Theme restore is intentionally
       omitted: the app is dark-only, so there is no theme class to set pre-paint. -->
  <style>
    html { background-color: #0f0f0f }
    body { margin: 0; min-height: 100vh; background-color: #0f0f0f; color: #f0f0f0; line-height: 1.5; font-family: 'DM Sans', 'DM Sans Fallback', -apple-system, sans-serif }
    #root { min-height: 100vh }
    @media (max-width: 480px) { html, body { background-color: #000 } }
  </style>
  <link rel="stylesheet" href="src/styles/index.css">
  <link rel="icon" href="./images/favicon.ico">
</head>

<body class="scroll-mask">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    (function() {
      var tokens = {
        'macecchi.github.io': '95a748642fe74cbfa6815eb774292776',
        'filadbd.pages.dev': 'f53f2a8d8fe94eb2b45924c2342403d6'
      };
      var token = tokens[location.hostname];
      if (token) {
        var s = document.createElement('script');
        s.defer = true;
        s.src = 'https://static.cloudflareinsights.com/beacon.min.js';
        s.setAttribute('data-cf-beacon', '{"token": "' + token + '"}');
        document.body.appendChild(s);
      }
    })();
  </script>
</body>

</html>
